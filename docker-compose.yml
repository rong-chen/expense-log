version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: expense-log-postgres
    restart: always
    environment:
      POSTGRES_USER: expense_log_admin
      POSTGRES_PASSWORD: expense_log_postgres@!!
      POSTGRES_DB: expense_log
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: expense-log-redis
    restart: always
    command: redis-server --requirepass expense_log_redis@!!
    volumes:
      - redisdata:/data

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: expense-log-backend
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8808:8808"
    volumes:
      - ./server/configs:/app/configs
      - ./server/attachments:/app/attachments
    environment:
      - TZ=Asia/Shanghai

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-log-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
